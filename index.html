<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINAY WEBSITE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="search-box">
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" placeholder="Enter city name..." id="cityInput">
            <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div id="weatherContent" style="display: none;">
            <div class="weather-box">
                <img src="" alt="weather icon" id="weatherIcon">
                <p class="temperature" id="temp">--°C</p>
                <p class="description" id="desc">--</p>
            </div>

            <div class="weather-details">
                <div class="humidity">
                    <i class="fa-solid fa-water"></i>
                    <div class="text">
                        <span id="humidityVal">--%</span>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="wind">
                    <i class="fa-solid fa-wind"></i>
                    <div class="text">
                        <span id="windVal">-- Km/h</span>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
        
        <p id="errorMsg" style="color: #ff4d4d; display: none; margin-top: 20px; font-weight: bold;">City not found. Please try again!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
